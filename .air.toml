root = "."

[build]
cmd = "go build -o ./tmp/api ./cmd/api"
bin = "./tmp/api"
full_bin = ""
include_ext = ["go", "mod", "sum", "yaml", "yml", "toml", "json"]
exclude_dir = ["tmp", "vendor", ".git", "docs"]
exclude_regex = ["_test\\.go$"]
delay = 500
stop_on_error = true

[log]
time = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "magenta"

[misc]
clean_on_exit = true
